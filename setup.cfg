[flake8]
max-line-length = 120
extend-ignore = E501
exclude =
    .git,
    __pycache__
per-file-ignores =
    lookahead_plugin.py: F401,F403
    lookahead_dockwidget_base_ui.py: F401
    lookahead_dockwidget_impl.py: F401,F811,F841,F541,E741,W291
    sequence_edit_dialog.py: F401,F541
    rrt_planner.py: F401,F841,W291
    sps_parsing_dialog.py: F401
    tracking_finalize_overlay.py: F401
